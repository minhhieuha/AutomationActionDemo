name: Go CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Install reporting tools
        run: |
          go install gotest.tools/gotestsum@latest
          go install github.com/vakenbolt/go-test-report@latest

      - name: Run Unit Tests
        run: |
          # Unit Tests phải vượt qua mới được chạy tiếp
          go test -json -v ./... > unit_report.json
          cat unit_report.json | gotestsum --format github-actions

      - name: Run Automation Tests
        # Chỉ chạy Automation khi có Pull Request hoặc push vào các nhánh quan trọng
        if: success() && (github.event_name == 'pull_request' || contains(fromJSON('["main", "master", "develop"]'), github.ref_name))
        run: |
          # Bật server ở chế độ background
          go run main.go &

          # Đợi cho đến khi server sẵn sàng (ping thành công)
          timeout 30s sh -c 'until curl -s http://127.0.0.1:8080/ping; do sleep 1; done'

          # Chạy bộ Automation Test với output JSON
          # '|| true' để code không dừng lại nếu automation test bị FAIL (vì ta vẫn muốn báo cáo)
          go test -json -v -tags automation ./tests/automation/... > auto_report.json || true
          cat auto_report.json | gotestsum --format github-actions

      - name: Generate HTML Report
        if: always()
        run: |
          # Ghép các file JSON và lọc lấy các dòng JSON hợp lệ của Go Test
          [ -f unit_report.json ] && grep "^{.*}$" unit_report.json > total_report.json || touch total_report.json
          [ -f auto_report.json ] && grep "^{.*}$" auto_report.json >> total_report.json || true

          # Nếu file tổng hợp có dữ liệu, thử tạo báo cáo
          if [ -s total_report.json ]; then
            # Thử dùng công cụ chính, nếu lỗi (do Panic) thì tự tạo HTML đơn giản
            cat total_report.json | go-test-report -o report.html || {
              echo "<html><body><h1>Tests Failed with Panic</h1><pre>$(cat total_report.json | tail -n 20)</pre></body></html>" > report.html
            }
          else
            echo "<html><body><h1>No test results found</h1></body></html>" > report.html
          fi

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Report-HTML
          path: report.html

  deploy-render:
    runs-on: ubuntu-latest
    needs: [test]
    # Chỉ deploy từ nhánh quan trọng (Main/Master)
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "Warning: RENDER_DEPLOY_HOOK_URL secret not set. Skipping deployment."
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    # Chỉ build image khi cần deploy (Main/Master)
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/automation-demo:latest
