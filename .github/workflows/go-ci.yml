name: Go CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install reporting tools
        run: |
          go install gotest.tools/gotestsum@latest
          go install github.com/vakenbolt/go-test-report@latest

      - name: Run Unit Tests
        run: |
          go test -json -v ./... > unit_report.json
          cat unit_report.json | gotestsum --format github-actions

      - name: Run Automation Tests
        if: always()
        run: |
          # Chạy server ở chế độ background
          go run main.go &
          
          # Đợi cho đến khi server sẵn sàng (thay vì sleep cố định)
          timeout 30s sh -c 'until curl -s http://127.0.0.1:8080/ping; do sleep 1; done'
          
          # Chạy bộ Automation Test với output JSON để tạo báo cáo sau này
          # '|| true' để code không dừng lại nếu test bị FAIL nhé
          go test -json -v -tags automation ./tests/automation/... > auto_report.json || true
          cat auto_report.json | gotestsum --format github-actions

      - name: Generate HTML Report
        if: always()
        run: |
          # Chỉ gộp những file JSON thực sự tồn tại
          [ -f unit_report.json ] && cp unit_report.json total_report.json || touch total_report.json
          [ -f auto_report.json ] && cat auto_report.json >> total_report.json || true
          
          # Tạo báo cáo HTML từ file tổng hợp (Dùng ống dẫn | )
          if [ -s total_report.json ]; then
            cat total_report.json | go-test-report -o report.html
          else
            echo "No test results found to generate report."
          fi

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Report-HTML
          path: report.html
