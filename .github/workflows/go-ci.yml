name: Go CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Nếu bạn dùng database như PostgreSQL, bạn có thể định nghĩa ở đây.
      # Hiện tại project dùng In-Memory nên không cần.

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: go mod download

    - name: Run Unit Tests
      run: go test -v ./...

    - name: Run Automation Tests
      run: |
        # Chạy server ở chế độ background
        go run main.go &
        
        # Đợi 5 giây để server sẵn sàng
        sleep 5
        
        # Chạy bộ Automation Test chuyên nghiệp
        go test -v ./tests/automation/...
